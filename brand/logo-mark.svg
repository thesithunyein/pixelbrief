<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" role="img" aria-label="PixelBrief">
  <rect width="128" height="128" rx="28" fill="#0B1F5C"/>
  <defs>
    <mask id="pb-cut">
      <rect width="128" height="128" fill="white"/>
      <!-- single brief silhouette — no extra bars (avoids mask dot artifact) -->
      <rect x="52" y="22" width="24" height="84" rx="5" fill="black"/>
    </mask>
  </defs>
  <g mask="url(#pb-cut)">
    <text
      x="64"
      y="54"
      text-anchor="middle"
      font-family="Arial Black, Impact, Haettenschweiler, sans-serif"
      font-size="50"
      font-weight="900"
      letter-spacing="-2"
      fill="#7AA2FF"
    >P</text>
    <text
      x="64"
      y="114"
      text-anchor="middle"
      font-family="Arial Black, Impact, Haettenschweiler, sans-serif"
      font-size="50"
      font-weight="900"
      letter-spacing="-2"
      fill="#2B60F5"
    >B</text>
  </g>
</svg>
